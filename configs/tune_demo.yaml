data:
  root_dir: data/connectivity
  skip_ocid: true
  measurement_features_csv: data/connectivity/derived/measurement_altitudes_dem.csv
  bs_features_csv: data/connectivity/derived/bs_altitudes_dem_matched.csv

preprocess:
  min_signal_dbm: -150
  max_signal_dbm: -30
  min_total_samples_per_cell: 10
  signal_threshold_dbm: [-105, -110, -115, -120]

split:
  strategy: random
  test_fraction: 0.3
  random_state: 42

methods:
  convex_hull:
    min_samples: 3
    outlier:
      strategy: [none, percentile]
      percentile: [90.0, 95.0]
      min_keep: 3

  alpha_shape:
    min_samples: 4
    alpha: [0.005, 0.01, 0.02]
    outlier:
      strategy: percentile
      percentile: 98.0
      min_keep: 4

  kriging:
    min_samples: 6
    variogram_model: [linear, spherical]
    nlags: [6, 10]
    jitter_epsilon: 0.01
    outlier:
      strategy: mad
      mad_k: 3.5
      min_keep: 6

  idw:
    min_samples: 4
    k_neighbors: 24
    power: 1.0
    epsilon: 1.0e-12
    outlier:
      strategy: mad
      mad_k: 2.5
      min_keep: 6

  gpr:
    min_samples: 8
    length_scale: [0.001, 0.003]
    noise_level: [1.0, 4.0]
    alpha: 1.0e-6
    normalize_y: true
    max_train: 300
    random_state: 42
    outlier:
      strategy: mad
      mad_k: 3.5
      min_keep: 8

  ml:
    min_samples: 20
    model: [rf, et, gb]
    feature_set: [baseline, enriched]
    random_state: 42
    n_estimators: 120
    max_depth: 8
    min_samples_leaf: 3
    min_samples_split: 2
    learning_rate: 0.1
    subsample: 1.0
    colsample_bytree: 1.0
    class_weight: null
    use_gpu: false
    fit_progress_every: 100
    predict_progress_every: 100

experiment:
  max_cells: null

output:
  summary_csv: results/metrics/metrics_summary_tune_demo.csv
  split_info_csv: results/metrics/split_info_tune_demo.csv
