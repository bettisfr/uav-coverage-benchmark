data:
  root_dir: data/connectivity
  skip_ocid: true
  measurement_features_csv: data/connectivity/derived/measurement_altitudes_dem.csv
  bs_features_csv: data/connectivity/derived/bs_altitudes_dem_matched.csv

preprocess:
  min_signal_dbm: -150
  max_signal_dbm: -30
  min_total_samples_per_cell: 10
  signal_threshold_dbm: [-100, -105, -110, -115, -120]

split:
  strategy: random
  test_fraction: 0.3
  random_state: 42

methods:
  convex_hull:
    min_samples: 3
    outlier:
      strategy: percentile
      percentile: 97.0
      mad_k: 3.5
      dbscan_eps: 0.0007
      dbscan_min_samples: 5
      min_keep: 3
  alpha_shape:
    min_samples: 4
    alpha: 0.01
    outlier:
      strategy: percentile
      percentile: 98.0
      mad_k: 3.5
      dbscan_eps: 0.0007
      dbscan_min_samples: 5
      min_keep: 4
  kriging:
    min_samples: 6
    variogram_model: spherical
    nlags: 12
    jitter_epsilon: 0.01
    outlier:
      strategy: mad
      percentile: 98.0
      mad_k: 3.5
      dbscan_eps: 0.0007
      dbscan_min_samples: 5
      min_keep: 6
  idw:
    min_samples: 4
    k_neighbors: 24
    power: 1.0
    epsilon: 1.0e-12
    outlier:
      strategy: mad
      mad_k: 2.5
      min_keep: 6
  gpr:
    min_samples: 8
    length_scale: 0.001
    noise_level: 1.0
    alpha: 1.0e-6
    normalize_y: true
    max_train: 400
    random_state: 42
    outlier:
      strategy: mad
      mad_k: 3.5
      min_keep: 8
  ml:
    scope: global
    min_samples: 20
    feature_set: global_poly
    model: rf
    random_state: 42
    n_estimators: 600
    max_depth: null
    min_samples_leaf: 1
    min_samples_split: 2
    fit_progress_every: 50
    predict_progress_every: 50
    outlier:
      strategy: none
      percentile: 99.0
      mad_k: 4.0
      dbscan_eps: 0.0007
      dbscan_min_samples: 5
      min_keep: 20

experiment:
  max_cells: null

output:
  summary_csv: results/metrics/metrics_summary.csv
  split_info_csv: results/metrics/split_info.csv
